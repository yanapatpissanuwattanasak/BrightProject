<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-go"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-go2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="stone-body" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="50%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#374151"/>
    </radialGradient>
    <radialGradient id="stone-head" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d1d5db"/>
      <stop offset="60%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </radialGradient>
    <radialGradient id="rune-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <g>
    <!-- Heavy slow pulse, very subtle movement -->
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-3;0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Earth glow aura (behind) -->
    <ellipse cx="60" cy="110" rx="56" ry="52" fill="#78350f" opacity="0.08" filter="url(#glow-go2)">
      <animate attributeName="opacity" values="0.08;0.16;0.08" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow (heavy) -->
    <ellipse cx="60" cy="157" rx="32" ry="6" fill="#000" opacity="0.45">
      <animate attributeName="rx" values="32;28;32" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Rock debris at base -->
    <ellipse cx="30" cy="155" rx="7" ry="4" fill="#4b5563" opacity="0.5" transform="rotate(-15,30,155)"/>
    <ellipse cx="90" cy="153" rx="6" ry="3" fill="#374151" opacity="0.5" transform="rotate(10,90,153)"/>
    <ellipse cx="60" cy="157" rx="8" ry="3" fill="#6b7280" opacity="0.4"/>

    <!-- Legs (massive stone pillars) -->
    <rect x="36" y="115" width="20" height="40" rx="4" fill="url(#stone-body)"/>
    <rect x="64" y="115" width="20" height="40" rx="4" fill="url(#stone-body)"/>
    <!-- Leg highlight -->
    <rect x="38" y="117" width="8" height="36" rx="2" fill="#9ca3af" opacity="0.2"/>
    <rect x="66" y="117" width="8" height="36" rx="2" fill="#9ca3af" opacity="0.2"/>
    <!-- Crack lines on legs -->
    <line x1="46" y1="118" x2="44" y2="135" stroke="#374151" stroke-width="1.5" opacity="0.6"/>
    <line x1="74" y1="120" x2="76" y2="138" stroke="#374151" stroke-width="1.5" opacity="0.6"/>
    <!-- Stone feet -->
    <rect x="33" y="148" width="26" height="10" rx="3" fill="#4b5563"/>
    <rect x="61" y="148" width="26" height="10" rx="3" fill="#4b5563"/>

    <!-- Body (massive boulder torso) -->
    <rect x="26" y="78" width="68" height="44" rx="8" fill="url(#stone-body)"/>
    <!-- Body highlight -->
    <rect x="30" y="82" width="24" height="36" rx="4" fill="#9ca3af" opacity="0.15"/>
    <!-- Rock crack lines on body -->
    <path d="M50,80 Q46,90 50,100" stroke="#374151" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M70,82 Q74,95 70,108" stroke="#374151" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M38,90 Q50,87 55,95" stroke="#374151" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Chest rune circle -->
    <circle cx="60" cy="99" r="16" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7" filter="url(#glow-go)">
      <animate attributeName="r" values="16;18;16" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="99" r="11" fill="url(#rune-grad)" opacity="0.25" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.25;0.55;0.25" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Rune symbol -->
    <text x="53" y="104" font-size="13" fill="#fbbf24" opacity="0.9" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
      ᚱ
    </text>
    <!-- Rune outer ring marks -->
    <circle cx="60" cy="83" r="1.5" fill="#f59e0b" filter="url(#glow-go)"/>
    <circle cx="60" cy="115" r="1.5" fill="#f59e0b" filter="url(#glow-go)"/>
    <circle cx="44" cy="99" r="1.5" fill="#f59e0b" filter="url(#glow-go)"/>
    <circle cx="76" cy="99" r="1.5" fill="#f59e0b" filter="url(#glow-go)"/>

    <!-- Arms (massive) -->
    <!-- Left arm -->
    <rect x="8" y="80" width="20" height="50" rx="8" fill="url(#stone-body)"/>
    <!-- Left fist -->
    <rect x="6" y="126" width="24" height="20" rx="6" fill="#6b7280"/>
    <line x1="12" y1="128" x2="10" y2="140" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="128" x2="24" y2="142" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
    <!-- Left knuckle rune -->
    <circle cx="18" cy="134" r="5" fill="#f59e0b" opacity="0.5" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Right arm -->
    <rect x="92" y="80" width="20" height="50" rx="8" fill="url(#stone-body)"/>
    <!-- Right fist raised -->
    <rect x="90" y="58" width="24" height="24" rx="6" fill="#6b7280"/>
    <line x1="96" y1="60" x2="94" y2="72" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
    <line x1="106" y1="60" x2="108" y2="74" stroke="#374151" stroke-width="1.5" opacity="0.5"/>
    <!-- Right knuckle rune -->
    <circle cx="102" cy="68" r="5" fill="#f59e0b" opacity="0.5" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <!-- Fist impact crack lines -->
    <line x1="90" y1="58" x2="84" y2="50" stroke="#f59e0b" stroke-width="1" opacity="0.5" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="90" y1="60" x2="82" y2="56" stroke="#fbbf24" stroke-width="1" opacity="0.4" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="92" y1="58" x2="86" y2="46" stroke="#f59e0b" stroke-width="1" opacity="0.3" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </line>

    <!-- Neck (thick stone) -->
    <rect x="48" y="66" width="24" height="16" rx="4" fill="#6b7280"/>

    <!-- Head (large square boulder) -->
    <rect x="32" y="32" width="56" height="52" rx="6" fill="url(#stone-head)"/>
    <!-- Head highlight -->
    <rect x="36" y="36" width="20" height="24" rx="3" fill="#d1d5db" opacity="0.15"/>
    <!-- Head crack -->
    <path d="M60,34 Q56,44 60,52 Q64,60 60,68" stroke="#374151" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M44,40 Q50,46 46,54" stroke="#374151" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Stone brow ridge -->
    <rect x="32" y="58" width="56" height="8" rx="3" fill="#4b5563" opacity="0.6"/>

    <!-- Eyes — deep glowing amber runes -->
    <rect x="40" y="46" width="16" height="10" rx="3" fill="#0a0a0f"/>
    <rect x="64" y="46" width="16" height="10" rx="3" fill="#0a0a0f"/>
    <rect x="42" y="48" width="12" height="6" rx="2" fill="#f59e0b" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="66" y="48" width="12" height="6" rx="2" fill="#f59e0b" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <!-- Eye glint -->
    <rect x="43" y="48" width="4" height="3" rx="1" fill="#fffbeb" opacity="0.7"/>
    <rect x="67" y="48" width="4" height="3" rx="1" fill="#fffbeb" opacity="0.7"/>

    <!-- Mouth (stone slit) -->
    <rect x="42" y="68" width="36" height="4" rx="2" fill="#0a0a0f" opacity="0.7"/>
    <!-- Teeth-like cracks -->
    <line x1="50" y1="68" x2="50" y2="72" stroke="#374151" stroke-width="2"/>
    <line x1="58" y1="68" x2="58" y2="72" stroke="#374151" stroke-width="2"/>
    <line x1="66" y1="68" x2="66" y2="72" stroke="#374151" stroke-width="2"/>

    <!-- Rock/debris particles from fist -->
    <circle cx="80" cy="50" r="3" fill="#9ca3af">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="80;72;80" dur="1.5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="50;42;50" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="88" cy="44" r="2" fill="#6b7280">
      <animate attributeName="opacity" values="0;0.7;0" dur="1.5s" begin="0.25s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="88;80;88" dur="1.5s" begin="0.25s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="44;34;44" dur="1.5s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <circle cx="84" cy="46" r="2" fill="#d1d5db">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="46;36;46" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Rune glow ground -->
    <ellipse cx="60" cy="154" rx="24" ry="5" fill="#f59e0b" opacity="0.1" filter="url(#glow-go)">
      <animate attributeName="opacity" values="0.1;0.22;0.1" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
