<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-dr"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fire-glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="scale-grad" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="60%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <radialGradient id="belly-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#f87171"/>
    </radialGradient>
    <linearGradient id="fire-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="wing-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#1a0505" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-6;0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="28" ry="5" fill="#000" opacity="0.35">
      <animate attributeName="rx" values="28;22;28" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Wings (behind body) -->
    <!-- Left wing -->
    <path d="M38,80 Q10,55 5,30 Q18,45 28,62 Q16,40 25,22 Q32,42 36,65 Q24,38 38,25 Q40,52 38,80 Z"
      fill="url(#wing-grad)" opacity="0.88">
      <animate attributeName="d"
        values="M38,80 Q10,55 5,30 Q18,45 28,62 Q16,40 25,22 Q32,42 36,65 Q24,38 38,25 Q40,52 38,80 Z;
                M38,80 Q12,60 8,34 Q20,48 30,66 Q18,44 26,24 Q33,45 36,68 Q26,40 40,27 Q41,54 38,80 Z;
                M38,80 Q10,55 5,30 Q18,45 28,62 Q16,40 25,22 Q32,42 36,65 Q24,38 38,25 Q40,52 38,80 Z"
        dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Right wing -->
    <path d="M82,80 Q110,55 115,30 Q102,45 92,62 Q104,40 95,22 Q88,42 84,65 Q96,38 82,25 Q80,52 82,80 Z"
      fill="url(#wing-grad)" opacity="0.88">
      <animate attributeName="d"
        values="M82,80 Q110,55 115,30 Q102,45 92,62 Q104,40 95,22 Q88,42 84,65 Q96,38 82,25 Q80,52 82,80 Z;
                M82,80 Q108,60 112,34 Q100,48 90,66 Q102,44 94,24 Q87,45 84,68 Q94,40 80,27 Q79,54 82,80 Z;
                M82,80 Q110,55 115,30 Q102,45 92,62 Q104,40 95,22 Q88,42 84,65 Q96,38 82,25 Q80,52 82,80 Z"
        dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Wing membrane lines -->
    <line x1="38" y1="80" x2="5" y2="30" stroke="#991b1b" stroke-width="1" opacity="0.5"/>
    <line x1="38" y1="80" x2="25" y2="22" stroke="#991b1b" stroke-width="1" opacity="0.4"/>
    <line x1="82" y1="80" x2="115" y2="30" stroke="#991b1b" stroke-width="1" opacity="0.5"/>
    <line x1="82" y1="80" x2="95" y2="22" stroke="#991b1b" stroke-width="1" opacity="0.4"/>

    <!-- Tail -->
    <path d="M60,140 Q80,148 95,145 Q105,142 108,135 Q112,128 106,125"
      stroke="url(#scale-grad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M106,125 Q114,118 112,112 Q110,106 104,108"
      stroke="#b91c1c" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Tail tip -->
    <polygon points="104,108 112,102 106,114" fill="#ef4444"/>

    <!-- Body -->
    <ellipse cx="60" cy="112" rx="28" ry="34" fill="url(#scale-grad)"/>
    <!-- Belly -->
    <ellipse cx="60" cy="115" rx="16" ry="24" fill="url(#belly-grad)" opacity="0.8"/>
    <!-- Scale lines on body -->
    <path d="M42,95 Q60,90 78,95" stroke="#991b1b" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M40,108 Q60,103 80,108" stroke="#991b1b" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M42,122 Q60,117 78,122" stroke="#991b1b" stroke-width="1" fill="none" opacity="0.35"/>

    <!-- Legs / claws -->
    <path d="M40,138 Q32,145 30,152" stroke="#991b1b" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M80,138 Q88,145 90,152" stroke="#991b1b" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Claws -->
    <path d="M30,152 Q26,158 24,155 M30,152 Q28,160 26,158 M30,152 Q32,158 30,156" stroke="#7f1d1d" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M90,152 Q94,158 96,155 M90,152 Q92,160 94,158 M90,152 Q88,158 90,156" stroke="#7f1d1d" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Neck -->
    <path d="M46,82 Q50,70 60,62 Q70,70 74,82" fill="url(#scale-grad)"/>

    <!-- Head -->
    <ellipse cx="60" cy="60" rx="24" ry="22" fill="url(#scale-grad)"/>
    <!-- Head scale highlight -->
    <ellipse cx="55" cy="54" rx="12" ry="8" fill="#ef4444" opacity="0.4"/>

    <!-- Horns -->
    <path d="M46,44 Q38,25 42,14 Q46,28 50,42 Z" fill="#7f1d1d"/>
    <path d="M74,44 Q82,25 78,14 Q74,28 70,42 Z" fill="#7f1d1d"/>
    <path d="M47,44 Q40,28 44,18 Q47,30 50,43 Z" fill="#991b1b" opacity="0.7"/>
    <path d="M73,44 Q80,28 76,18 Q73,30 70,43 Z" fill="#991b1b" opacity="0.7"/>

    <!-- Nostrils -->
    <ellipse cx="54" cy="70" rx="3" ry="2" fill="#7f1d1d"/>
    <ellipse cx="66" cy="70" rx="3" ry="2" fill="#7f1d1d"/>
    <!-- Nostril smoke -->
    <circle cx="54" cy="68" r="2" fill="#f97316" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="68;62;68" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="68" r="2" fill="#f97316" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="68;62;68" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>

    <!-- Eyes — slit pupils, glowing orange -->
    <ellipse cx="49" cy="57" rx="6" ry="7" fill="#1a0505"/>
    <ellipse cx="71" cy="57" rx="6" ry="7" fill="#1a0505"/>
    <ellipse cx="49" cy="57" rx="4" ry="5.5" fill="#f97316" filter="url(#glow-dr)">
      <animate attributeName="ry" values="5.5;7;5.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="71" cy="57" rx="4" ry="5.5" fill="#f97316" filter="url(#glow-dr)">
      <animate attributeName="ry" values="5.5;7;5.5" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <!-- Slit pupils -->
    <ellipse cx="49" cy="57" rx="1.5" ry="5" fill="#0a0a0f"/>
    <ellipse cx="71" cy="57" rx="1.5" ry="5" fill="#0a0a0f"/>

    <!-- Mouth / jaw -->
    <path d="M42,72 Q60,82 78,72" stroke="#7f1d1d" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Fire breath -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0.8;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <!-- Flame base -->
      <path d="M60,75 Q50,85 45,100 Q55,88 60,95 Q65,88 75,100 Q70,85 60,75 Z" fill="url(#fire-grad)" filter="url(#fire-glow)"/>
      <path d="M60,78 Q53,90 50,105 Q57,92 60,98 Q63,92 70,105 Q67,90 60,78 Z" fill="#fbbf24" opacity="0.8"/>
      <path d="M60,82 Q57,92 55,108 Q59,95 60,100 Q61,95 65,108 Q63,92 60,82 Z" fill="#fff" opacity="0.6"/>
    </g>

    <!-- Ambient fire glow -->
    <ellipse cx="60" cy="80" rx="20" ry="10" fill="#f97316" opacity="0.08" filter="url(#fire-glow)">
      <animate attributeName="opacity" values="0.08;0.2;0.08" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
