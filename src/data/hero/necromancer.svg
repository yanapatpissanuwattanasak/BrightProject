<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-nc"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-nc2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="robe-grad" cx="40%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#0f0e2a"/>
      <stop offset="100%" stop-color="#030308"/>
    </radialGradient>
    <radialGradient id="orb-nc" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-9;0,-2;0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.5 0 0.8 1;0.4 0 0.6 1"/>

    <!-- Purple death aura -->
    <ellipse cx="60" cy="112" rx="50" ry="52" fill="#7c3aed" opacity="0.06" filter="url(#glow-nc2)">
      <animate attributeName="opacity" values="0.06;0.15;0.06" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="50;58;50" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="20" ry="4" fill="#000" opacity="0.22">
      <animate attributeName="rx" values="20;14;20" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Staff -->
    <line x1="90" y1="155" x2="76" y2="8" stroke="#2d1b69" stroke-width="5" stroke-linecap="round"/>
    <line x1="90" y1="155" x2="76" y2="8" stroke="#4c1d95" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

    <!-- Staff skull orb -->
    <circle cx="76" cy="9" r="11" fill="url(#orb-nc)" filter="url(#glow-nc)">
      <animate attributeName="r" values="11;14;11" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Skull -->
    <ellipse cx="76" cy="8" rx="7" ry="6" fill="#f5f0ff" opacity="0.92"/>
    <ellipse cx="73" cy="7" rx="2.2" ry="2.5" fill="#1e1b4b"/>
    <ellipse cx="79" cy="7" rx="2.2" ry="2.5" fill="#1e1b4b"/>
    <path d="M73,12 Q76,14 79,12" stroke="#1e1b4b" stroke-width="1" fill="none"/>
    <!-- Orb glow ring -->
    <circle cx="76" cy="9" r="16" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.35" filter="url(#glow-nc)">
      <animate attributeName="r" values="16;20;16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Robe body -->
    <path d="M32,82 Q22,112 18,155 L102,155 Q98,112 88,82 Z" fill="url(#robe-grad)"/>
    <!-- Robe highlights / folds -->
    <path d="M50,84 Q46,110 44,148 Q52,122 54,148 Q58,116 58,84 Z" fill="#312e81" opacity="0.28"/>
    <path d="M70,84 Q74,110 76,148 Q68,122 66,148 Q62,116 62,84 Z" fill="#312e81" opacity="0.28"/>
    <!-- Robe edge trim -->
    <path d="M32,82 Q22,112 18,155" stroke="#4c1d95" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M88,82 Q98,112 102,155" stroke="#4c1d95" stroke-width="1.5" fill="none" opacity="0.5"/>
    <!-- Rune marks on robe -->
    <path d="M44,100 L44,108 M40,104 L48,104" stroke="#7c3aed" stroke-width="1.2" opacity="0.5"/>
    <path d="M72,118 L72,126 M68,122 L76,122" stroke="#7c3aed" stroke-width="1.2" opacity="0.45"/>
    <path d="M56,134 L56,140 M53,137 L59,137" stroke="#a855f7" stroke-width="1" opacity="0.4"/>

    <!-- Left arm -->
    <path d="M36,88 Q24,104 22,120" stroke="#0f0e2a" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="122" r="7" fill="#1e1b4b"/>
    <path d="M15,118 Q12,112 15,109 M18,116 Q15,110 18,106 M22,115 Q20,108 24,106" stroke="#4c1d95" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Right arm (holding staff) -->
    <path d="M84,88 Q92,102 90,120" stroke="#0f0e2a" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="90" cy="122" r="7" fill="#1e1b4b"/>

    <!-- Hood -->
    <path d="M30,74 Q34,28 60,24 Q86,28 90,74 Q80,58 60,56 Q40,58 30,74 Z" fill="#09090f"/>
    <path d="M30,74 Q34,28 60,24 Q86,28 90,74" stroke="#1e1b4b" stroke-width="2" fill="none"/>
    <!-- Face shadow -->
    <ellipse cx="60" cy="60" rx="18" ry="16" fill="#030308"/>

    <!-- Glowing eyes in hood -->
    <ellipse cx="52" cy="59" rx="5" ry="6" fill="#a855f7" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="6;8;6" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="68" cy="59" rx="5" ry="6" fill="#a855f7" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="ry" values="6;8;6" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
    </ellipse>
    <ellipse cx="52" cy="59" rx="2" ry="3" fill="#1e0038"/>
    <ellipse cx="68" cy="59" rx="2" ry="3" fill="#1e0038"/>
    <!-- Lich grin -->
    <path d="M50,70 Q60,76 70,70" stroke="#4c1d95" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Floating soul wisps -->
    <circle cx="12" cy="92" r="4" fill="#a855f7" opacity="0" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="92;74;92" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="12;16;12" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="108" cy="100" r="3.5" fill="#c084fc" opacity="0" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;82;100" dur="2.8s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="118" r="2.5" fill="#7c3aed" opacity="0" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="118;102;118" dur="2.2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="106" cy="78" r="2" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="78;62;78" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="14" cy="140" r="3" fill="#c084fc" opacity="0" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0;0.55;0" dur="2s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="140;126;140" dur="2s" begin="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Ground death glow -->
    <ellipse cx="60" cy="156" rx="22" ry="4" fill="#7c3aed" opacity="0.1" filter="url(#glow-nc)">
      <animate attributeName="opacity" values="0.1;0.24;0.1" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
