<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-pa"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-pa2"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="armor-pa" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="gold-pa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="holy-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffbeb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-5;0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Divine aura (back) -->
    <ellipse cx="60" cy="90" rx="52" ry="55" fill="#fef08a" opacity="0.07" filter="url(#glow-pa2)">
      <animate attributeName="rx" values="52;58;52" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.07;0.14;0.07" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Light rays behind (cross) -->
    <line x1="60" y1="10" x2="60" y2="155" stroke="#fef08a" stroke-width="2" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.25;0.12" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="5" y1="82" x2="115" y2="82" stroke="#fef08a" stroke-width="2" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.25;0.12" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="26" ry="4" fill="#000" opacity="0.2">
      <animate attributeName="rx" values="26;21;26" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Legs -->
    <rect x="43" y="118" width="14" height="38" rx="4" fill="#c7d2fe"/>
    <rect x="63" y="118" width="14" height="38" rx="4" fill="#c7d2fe"/>
    <!-- Boot gold trim -->
    <rect x="41" y="148" width="18" height="8" rx="3" fill="url(#gold-pa)"/>
    <rect x="61" y="148" width="18" height="8" rx="3" fill="url(#gold-pa)"/>
    <!-- Knee guard -->
    <ellipse cx="50" cy="120" rx="9" ry="5" fill="url(#gold-pa)"/>
    <ellipse cx="70" cy="120" rx="9" ry="5" fill="url(#gold-pa)"/>

    <!-- Body armor -->
    <rect x="34" y="84" width="52" height="38" rx="5" fill="url(#armor-pa)"/>
    <!-- Chest plate -->
    <path d="M44,86 Q60,81 76,86 L80,104 Q60,110 40,104 Z" fill="url(#gold-pa)" opacity="0.75"/>
    <!-- Holy cross on chest -->
    <rect x="57" y="87" width="6" height="18" rx="2" fill="#fffbeb" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="93" width="20" height="5" rx="2" fill="#fffbeb" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Belt -->
    <rect x="34" y="118" width="52" height="6" rx="2" fill="url(#gold-pa)"/>

    <!-- Shoulder guards -->
    <ellipse cx="34" cy="90" rx="13" ry="8" fill="url(#armor-pa)"/>
    <ellipse cx="86" cy="90" rx="13" ry="8" fill="url(#armor-pa)"/>
    <ellipse cx="34" cy="89" rx="10" ry="6" fill="url(#gold-pa)" opacity="0.7"/>
    <ellipse cx="86" cy="89" rx="10" ry="6" fill="url(#gold-pa)" opacity="0.7"/>

    <!-- Shield arm (left) -->
    <path d="M38,95 Q24,110 22,125" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Shield -->
    <path d="M10,110 Q10,94 22,89 Q34,94 34,110 Q34,126 22,134 Q10,126 10,110 Z" fill="url(#armor-pa)"/>
    <path d="M13,110 Q13,97 22,93 Q31,97 31,110 Q31,123 22,130 Q13,123 13,110 Z" fill="url(#gold-pa)" opacity="0.6"/>
    <!-- Shield holy symbol -->
    <circle cx="22" cy="110" r="7" fill="url(#holy-grad)" filter="url(#glow-pa)">
      <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="22" y1="104" x2="22" y2="116" stroke="#fffbeb" stroke-width="1.5" opacity="0.9"/>
    <line x1="16" y1="110" x2="28" y2="110" stroke="#fffbeb" stroke-width="1.5" opacity="0.9"/>

    <!-- Sword arm (right) + sword held up -->
    <path d="M82,95 Q94,108 95,120" stroke="#c7d2fe" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Sword blade -->
    <rect x="94" y="14" width="7" height="75" rx="2" fill="#e0e7ff"/>
    <rect x="95.5" y="14" width="4" height="70" rx="1" fill="#fff" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Cross guard -->
    <rect x="86" y="84" width="23" height="6" rx="2" fill="url(#gold-pa)"/>
    <!-- Sword grip -->
    <rect x="95" y="90" width="5" height="22" rx="2" fill="#78350f"/>
    <!-- Pommel -->
    <circle cx="97" cy="115" r="5" fill="url(#gold-pa)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Sword divine glow -->
    <rect x="94" y="14" width="7" height="75" rx="2" fill="#fef08a" opacity="0.3" filter="url(#glow-pa2)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Helmet -->
    <rect x="42" y="55" width="36" height="30" rx="4" fill="url(#armor-pa)"/>
    <ellipse cx="60" cy="56" rx="18" ry="11" fill="#c7d2fe"/>
    <!-- Helmet plume (white/gold) -->
    <path d="M60,44 Q52,28 50,12 Q57,22 60,32 Q63,22 70,12 Q68,28 60,44 Z" fill="#fffbeb" opacity="0.9"/>
    <path d="M60,44 Q56,30 55,18 Q59,26 60,34 Q61,26 65,18 Q64,30 60,44 Z" fill="url(#gold-pa)" opacity="0.5"/>
    <!-- Visor -->
    <rect x="43" y="66" width="34" height="7" rx="2" fill="#1e1b4b" opacity="0.7"/>
    <!-- Eyes behind visor (holy golden) -->
    <rect x="46" y="67" width="11" height="5" rx="1.5" fill="#fef08a" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="63" y="67" width="11" height="5" rx="1.5" fill="#fef08a" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <!-- Helmet gold trim -->
    <path d="M42,57 Q60,50 78,57" stroke="url(#gold-pa)" stroke-width="2.5" fill="none" opacity="0.9"/>

    <!-- Holy light particles -->
    <circle cx="18" cy="75" r="3" fill="#fef08a" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="75;60;75" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="102" cy="65" r="2.5" fill="#fde68a" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0;0.8;0" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="65;50;65" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="28" r="2" fill="#fffbeb" filter="url(#glow-pa)">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="28;14;28" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="110" r="2" fill="#fef08a">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="45" r="2" fill="#fde68a">
      <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
