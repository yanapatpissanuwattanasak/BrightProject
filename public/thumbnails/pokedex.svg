<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)" rx="12"/>

  <!-- Header bar -->
  <rect width="400" height="56" fill="url(#red)" rx="12"/>
  <rect y="44" width="400" height="12" fill="url(#red)"/>

  <!-- Pokeball button on header -->
  <circle cx="32" cy="28" r="16" fill="white" fill-opacity="0.15"/>
  <circle cx="32" cy="28" r="10" fill="white" fill-opacity="0.2"/>
  <line x1="22" y1="28" x2="42" y2="28" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="32" cy="28" r="4" fill="white" fill-opacity="0.6"/>

  <!-- Title -->
  <text x="58" y="35" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="white">Pokédex</text>

  <!-- Search bar placeholder -->
  <rect x="270" y="14" width="110" height="28" rx="14" fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="315" y="33" font-family="Inter, system-ui, sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Search…</text>

  <!-- Type pills -->
  <rect x="16" y="68" width="46" height="18" rx="9" fill="#F08030"/>
  <text x="39" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">fire</text>
  <rect x="68" y="68" width="50" height="18" rx="9" fill="#6890F0"/>
  <text x="93" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">water</text>
  <rect x="124" y="68" width="50" height="18" rx="9" fill="#78C850"/>
  <text x="149" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">grass</text>
  <rect x="180" y="68" width="60" height="18" rx="9" fill="#F8D030"/>
  <text x="210" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#333" text-anchor="middle">electric</text>
  <rect x="246" y="68" width="44" height="18" rx="9" fill="#A040A0"/>
  <text x="268" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">poison</text>
  <rect x="296" y="68" width="48" height="18" rx="9" fill="#7038F8"/>
  <text x="320" y="81" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="white" text-anchor="middle">dragon</text>

  <!-- Pokemon cards grid (4 cards) -->
  <!-- Card 1 -->
  <rect x="16" y="98" width="84" height="128" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="58" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" font-weight="700">#001</text>
  <circle cx="58" cy="148" r="28" fill="rgba(120,200,80,0.15)"/>
  <text x="58" y="156" font-size="32" text-anchor="middle" dominant-baseline="middle">🌿</text>
  <text x="58" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle" font-weight="600">Bulbasaur</text>
  <rect x="30" y="196" width="56" height="14" rx="7" fill="#78C850"/>
  <text x="58" y="207" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">grass</text>

  <!-- Card 2 -->
  <rect x="108" y="98" width="84" height="128" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="150" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" font-weight="700">#004</text>
  <circle cx="150" cy="148" r="28" fill="rgba(240,128,48,0.15)"/>
  <text x="150" y="156" font-size="32" text-anchor="middle" dominant-baseline="middle">🔥</text>
  <text x="150" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle" font-weight="600">Charmander</text>
  <rect x="122" y="196" width="56" height="14" rx="7" fill="#F08030"/>
  <text x="150" y="207" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">fire</text>

  <!-- Card 3 -->
  <rect x="200" y="98" width="84" height="128" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="242" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" font-weight="700">#007</text>
  <circle cx="242" cy="148" r="28" fill="rgba(104,144,240,0.15)"/>
  <text x="242" y="156" font-size="32" text-anchor="middle" dominant-baseline="middle">💧</text>
  <text x="242" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle" font-weight="600">Squirtle</text>
  <rect x="214" y="196" width="56" height="14" rx="7" fill="#6890F0"/>
  <text x="242" y="207" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">water</text>

  <!-- Card 4 -->
  <rect x="292" y="98" width="92" height="128" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="338" y="115" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" font-weight="700">#025</text>
  <circle cx="338" cy="148" r="28" fill="rgba(248,208,48,0.15)"/>
  <text x="338" y="156" font-size="32" text-anchor="middle" dominant-baseline="middle">⚡</text>
  <text x="338" y="186" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#F3F4F6" text-anchor="middle" font-weight="600">Pikachu</text>
  <rect x="306" y="196" width="64" height="14" rx="7" fill="#F8D030"/>
  <text x="338" y="207" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#333" text-anchor="middle">electric</text>
</svg>
