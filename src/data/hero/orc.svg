<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-oc"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-oc2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="orc-body" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <radialGradient id="orc-head" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <linearGradient id="axe-grad-oc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="50%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#52525b"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-4;0,0" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Aura -->
    <ellipse cx="60" cy="115" rx="50" ry="48" fill="#16a34a" opacity="0.06" filter="url(#glow-oc2)">
      <animate attributeName="opacity" values="0.06;0.14;0.06" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="30" ry="6" fill="#000" opacity="0.45">
      <animate attributeName="rx" values="30;25;30" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Axe handle -->
    <rect x="9" y="58" width="6" height="72" rx="3" fill="#78350f"/>
    <rect x="10" y="60" width="3" height="68" rx="1" fill="#92400e" opacity="0.5"/>
    <!-- Axe head -->
    <path d="M15,62 Q30,50 32,70 Q30,80 15,82 Q22,72 15,62 Z" fill="url(#axe-grad-oc)"/>
    <path d="M15,62 Q26,54 28,68 Q26,76 15,80 Z" fill="#f4f4f5" opacity="0.35"/>
    <!-- Axe glint -->
    <line x1="28" y1="54" x2="30" y2="78" stroke="#fff" stroke-width="1.5" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <!-- Bottom spike -->
    <path d="M15,82 Q24,88 20,96 Q12,88 15,82 Z" fill="url(#axe-grad-oc)"/>

    <!-- Legs -->
    <rect x="37" y="118" width="18" height="36" rx="5" fill="#16a34a"/>
    <rect x="65" y="118" width="18" height="36" rx="5" fill="#16a34a"/>
    <!-- Feet -->
    <rect x="33" y="148" width="25" height="10" rx="4" fill="#14532d"/>
    <rect x="62" y="148" width="25" height="10" rx="4" fill="#14532d"/>
    <!-- Knee guards -->
    <rect x="38" y="118" width="16" height="8" rx="3" fill="#78350f" opacity="0.85"/>
    <rect x="66" y="118" width="16" height="8" rx="3" fill="#78350f" opacity="0.85"/>

    <!-- Body -->
    <rect x="28" y="78" width="64" height="44" rx="8" fill="url(#orc-body)"/>
    <!-- Tribal markings -->
    <path d="M48,82 Q44,92 48,102" stroke="#14532d" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M72,82 Q76,92 72,102" stroke="#14532d" stroke-width="2" fill="none" opacity="0.55"/>
    <path d="M40,92 Q52,88 60,94 Q68,88 80,92" stroke="#14532d" stroke-width="1.5" fill="none" opacity="0.45"/>
    <!-- Belt -->
    <rect x="28" y="118" width="64" height="7" rx="3" fill="#78350f"/>
    <rect x="55" y="118" width="10" height="7" rx="2" fill="#b45309"/>

    <!-- Shoulder guards -->
    <ellipse cx="28" cy="84" rx="13" ry="9" fill="#16a34a"/>
    <path d="M22,76 Q16,70 20,65 Q26,72 28,80 Z" fill="#14532d"/>
    <polygon points="20,72 15,60 26,62" fill="#78350f"/>
    <ellipse cx="92" cy="84" rx="13" ry="9" fill="#16a34a"/>
    <path d="M98,76 Q104,70 100,65 Q94,72 92,80 Z" fill="#14532d"/>
    <polygon points="100,72 105,60 94,62" fill="#78350f"/>

    <!-- Left arm (holding axe) -->
    <path d="M30,86 Q18,100 15,120" stroke="#16a34a" stroke-width="14" stroke-linecap="round" fill="none"/>
    <circle cx="14" cy="122" r="9" fill="#16a34a"/>

    <!-- Right arm (raised fist) -->
    <path d="M90,86 Q104,98 106,114" stroke="#16a34a" stroke-width="14" stroke-linecap="round" fill="none"/>
    <rect x="98" y="110" width="18" height="16" rx="5" fill="#16a34a"/>
    <!-- Knuckles -->
    <circle cx="103" cy="111" r="2.5" fill="#4ade80" opacity="0.5"/>
    <circle cx="109" cy="111" r="2.5" fill="#4ade80" opacity="0.5"/>
    <circle cx="115" cy="111" r="2.5" fill="#4ade80" opacity="0.5"/>

    <!-- Neck -->
    <rect x="50" y="66" width="20" height="16" rx="4" fill="#16a34a"/>

    <!-- Head -->
    <ellipse cx="60" cy="54" rx="24" ry="22" fill="url(#orc-head)"/>
    <ellipse cx="54" cy="46" rx="11" ry="8" fill="#4ade80" opacity="0.28"/>

    <!-- Tusks -->
    <path d="M46,68 Q40,78 42,84" stroke="#fef3c7" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M74,68 Q80,78 78,84" stroke="#fef3c7" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M46,68 Q41,76 43,81" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.45"/>
    <path d="M74,68 Q79,76 77,81" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.45"/>

    <!-- Brow ridge -->
    <path d="M36,44 Q60,36 84,44" stroke="#14532d" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Eyes — angry yellow -->
    <ellipse cx="49" cy="52" rx="8" ry="7" fill="#0a0a0f"/>
    <ellipse cx="71" cy="52" rx="8" ry="7" fill="#0a0a0f"/>
    <ellipse cx="49" cy="52" rx="6" ry="5" fill="#eab308" filter="url(#glow-oc)">
      <animate attributeName="ry" values="5;7;5" dur="2.2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="71" cy="52" rx="6" ry="5" fill="#eab308" filter="url(#glow-oc)">
      <animate attributeName="ry" values="5;7;5" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <ellipse cx="49" cy="52" rx="2" ry="4" fill="#000"/>
    <ellipse cx="71" cy="52" rx="2" ry="4" fill="#000"/>

    <!-- Nose -->
    <ellipse cx="57" cy="62" rx="3" ry="2" fill="#14532d"/>
    <ellipse cx="63" cy="62" rx="3" ry="2" fill="#14532d"/>

    <!-- Mouth snarl -->
    <path d="M44,68 Q60,74 76,68" stroke="#14532d" stroke-width="2.5" fill="none"/>

    <!-- War paint -->
    <line x1="40" y1="46" x2="46" y2="60" stroke="#dc2626" stroke-width="2.5" opacity="0.7"/>
    <line x1="80" y1="46" x2="74" y2="60" stroke="#dc2626" stroke-width="2.5" opacity="0.7"/>
    <line x1="44" y1="50" x2="48" y2="58" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="76" y1="50" x2="72" y2="58" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>

    <!-- Ground glow -->
    <ellipse cx="60" cy="157" rx="26" ry="4" fill="#16a34a" opacity="0.1" filter="url(#glow-oc)">
      <animate attributeName="opacity" values="0.1;0.22;0.1" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
