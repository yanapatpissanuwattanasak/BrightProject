<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-as"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-as2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="shadow-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <radialGradient id="blade-grad" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </radialGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-5;2,-3;0,0" dur="4s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Shadow (faint) -->
    <ellipse cx="60" cy="157" rx="20" ry="3" fill="#000" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.08;0.2" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow wisps rising from ground -->
    <path d="M50,148 Q46,138 50,128 Q54,138 50,128" stroke="#7c3aed" stroke-width="2" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M50,148 Q46,138 50,128;M50,148 Q48,135 52,120;M50,148 Q46,138 50,128" dur="2s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M68,148 Q72,136 68,124" stroke="#6d28d9" stroke-width="2" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.45;0" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="d" values="M68,148 Q72,136 68,124;M68,148 Q74,132 70,118;M68,148 Q72,136 68,124" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M60,150 Q56,140 60,128" stroke="#4c1d95" stroke-width="1.5" fill="none" opacity="0">
      <animate attributeName="opacity" values="0;0.4;0" dur="1.8s" begin="1.2s" repeatCount="indefinite"/>
    </path>

    <!-- Cloak / body (wide at bottom) -->
    <path d="M30,85 Q60,76 90,85 L100,155 Q60,162 20,155 Z" fill="url(#shadow-body)"/>
    <!-- Cloak texture lines -->
    <path d="M38,90 Q60,85 82,90" stroke="#2e1065" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M34,108 Q60,102 86,108" stroke="#1e1b4b" stroke-width="1" fill="none" opacity="0.3"/>

    <!-- Left dagger -->
    <g transform="rotate(-35, 25, 100)">
      <rect x="20" y="82" width="4" height="28" rx="1.5" fill="url(#blade-grad)"/>
      <rect x="21" y="82" width="2" height="24" rx="1" fill="#e9d5ff" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0;0.5" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="16" y="107" width="12" height="4" rx="1.5" fill="#4c1d95"/>
      <rect x="20" y="111" width="4" height="10" rx="1.5" fill="#2e1065"/>
      <!-- Dagger glow -->
      <rect x="20" y="82" width="4" height="28" rx="1.5" fill="#a78bfa" opacity="0.4" filter="url(#glow-as)">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Right dagger -->
    <g transform="rotate(35, 95, 100)">
      <rect x="93" y="82" width="4" height="28" rx="1.5" fill="url(#blade-grad)"/>
      <rect x="94" y="82" width="2" height="24" rx="1" fill="#e9d5ff" opacity="0.5">
        <animate attributeName="opacity" values="0.5;1;0;0.5" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
      </rect>
      <rect x="89" y="107" width="12" height="4" rx="1.5" fill="#4c1d95"/>
      <rect x="93" y="111" width="4" height="10" rx="1.5" fill="#2e1065"/>
      <rect x="93" y="82" width="4" height="28" rx="1.5" fill="#a78bfa" opacity="0.4" filter="url(#glow-as)">
        <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
      </rect>
    </g>

    <!-- Hood (deep, face hidden) -->
    <path d="M30,58 Q60,40 90,58 Q88,82 60,86 Q32,82 30,58 Z" fill="#0f0a1e"/>
    <!-- Hood shadow inside -->
    <path d="M34,60 Q60,46 86,60 Q84,78 60,82 Q36,78 34,60 Z" fill="#000" opacity="0.7"/>

    <!-- Mask covering lower face -->
    <rect x="40" y="70" width="40" height="14" rx="4" fill="#1e1b4b" opacity="0.9"/>

    <!-- Eyes glowing through hood -->
    <ellipse cx="50" cy="66" rx="6" ry="5" fill="#0f0a1e"/>
    <ellipse cx="70" cy="66" rx="6" ry="5" fill="#0f0a1e"/>
    <ellipse cx="50" cy="66" rx="4" ry="3.5" fill="#7c3aed" filter="url(#glow-as)">
      <animate attributeName="rx" values="4;5;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="66" rx="4" ry="3.5" fill="#7c3aed" filter="url(#glow-as)">
      <animate attributeName="rx" values="4;5;4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <!-- Eye outer glow -->
    <ellipse cx="50" cy="66" rx="8" ry="7" fill="#6d28d9" opacity="0.3" filter="url(#glow-as2)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="66" rx="8" ry="7" fill="#6d28d9" opacity="0.3" filter="url(#glow-as2)">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>

    <!-- Hood peak -->
    <path d="M44,46 Q60,28 76,46 Q60,42 44,46 Z" fill="#0f0a1e"/>
    <path d="M60,30 Q57,38 60,44 Q63,38 60,30 Z" fill="#1e1b4b" opacity="0.6"/>

    <!-- Shadow particles -->
    <circle cx="15" cy="90" r="2.5" fill="#7c3aed" opacity="0" filter="url(#glow-as)">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="90;78;90" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="100" r="2" fill="#6d28d9" opacity="0" filter="url(#glow-as)">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;86;100" dur="2.5s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="120" r="1.5" fill="#4c1d95" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="1.8s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="102" cy="130" r="1.5" fill="#5b21b6" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="2.2s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
