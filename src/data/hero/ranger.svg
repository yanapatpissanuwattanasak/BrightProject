<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-r"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-r2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="cloak-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <radialGradient id="head-r" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-6;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="24" ry="4" fill="#000" opacity="0.25">
      <animate attributeName="rx" values="24;19;24" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.1;0.25" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Quiver (behind body) -->
    <rect x="76" y="60" width="10" height="38" rx="3" fill="#78350f"/>
    <rect x="77" y="56" width="8" height="6" rx="2" fill="#92400e"/>
    <!-- Arrows in quiver -->
    <line x1="79" y1="56" x2="79" y2="40" stroke="#a16207" stroke-width="1.5"/>
    <line x1="82" y1="56" x2="82" y2="38" stroke="#a16207" stroke-width="1.5"/>
    <line x1="85" y1="56" x2="85" y2="42" stroke="#a16207" stroke-width="1.5"/>
    <polygon points="79,40 77,45 81,45" fill="#15803d"/>
    <polygon points="82,38 80,43 84,43" fill="#15803d"/>
    <polygon points="85,42 83,47 87,47" fill="#15803d"/>

    <!-- Cloak body -->
    <path d="M32,90 Q60,82 88,90 L94,152 Q60,160 26,152 Z" fill="url(#cloak-r)"/>
    <!-- Cloak hood folds -->
    <path d="M40,92 Q60,88 80,92" stroke="#166534" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M36,105 Q60,100 84,105" stroke="#166534" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Belt -->
    <rect x="36" y="118" width="48" height="6" rx="2" fill="#78350f"/>
    <rect x="55" y="118" width="10" height="6" rx="1" fill="#a16207"/>

    <!-- Bow (left side) -->
    <path d="M20,50 Q8,80 20,120" stroke="#92400e" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M20,50 Q32,80 20,120" stroke="#78350f" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Bow string -->
    <line x1="20" y1="52" x2="20" y2="118" stroke="#fef9c3" stroke-width="1" opacity="0.8"/>
    <!-- Arrow nocked -->
    <line x1="20" y1="85" x2="55" y2="78" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
    <polygon points="55,78 50,74 50,82" fill="#15803d"/>
    <!-- Bow tips glow -->
    <circle cx="20" cy="50" r="3" fill="#86efac" opacity="0.7" filter="url(#glow-r)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="120" r="3" fill="#86efac" opacity="0.7" filter="url(#glow-r)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <!-- Left arm holding bow -->
    <path d="M36,95 Q22,88 20,85" stroke="#14532d" stroke-width="9" stroke-linecap="round" fill="none"/>
    <!-- Right arm drawing arrow -->
    <path d="M84,95 Q70,82 55,78" stroke="#14532d" stroke-width="8" stroke-linecap="round" fill="none"/>
    <circle cx="55" cy="78" r="5" fill="#fde68a"/>

    <!-- Hood -->
    <ellipse cx="60" cy="68" rx="26" ry="10" fill="#166534"/>
    <!-- Hood shadow inside -->
    <ellipse cx="60" cy="66" rx="20" ry="7" fill="#052e16" opacity="0.7"/>

    <!-- Head (partially visible under hood) -->
    <circle cx="60" cy="72" r="15" fill="url(#head-r)"/>

    <!-- Eyes - sharp green -->
    <circle cx="54" cy="70" r="3.5" fill="#052e16"/>
    <circle cx="66" cy="70" r="3.5" fill="#052e16"/>
    <circle cx="54" cy="70" r="2.2" fill="#22c55e" filter="url(#glow-r)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="70" r="2.2" fill="#22c55e" filter="url(#glow-r)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="53" cy="69" r="0.8" fill="#fff" opacity="0.9"/>
    <circle cx="65" cy="69" r="0.8" fill="#fff" opacity="0.9"/>

    <!-- Hood peak -->
    <path d="M44,62 Q60,44 76,62 Q60,58 44,62 Z" fill="#14532d"/>
    <path d="M60,44 Q56,52 60,58 Q64,52 60,44 Z" fill="#166534" opacity="0.7"/>

    <!-- Leaf particles -->
    <ellipse cx="14" cy="80" rx="5" ry="3" fill="#16a34a" opacity="0" transform="rotate(-30,14,80)">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;65;80" dur="3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="14;10;14" dur="3s" begin="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="106" cy="95" rx="4" ry="2.5" fill="#15803d" opacity="0" transform="rotate(20,106,95)">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="95;80;95" dur="2.5s" begin="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="18" cy="115" rx="4" ry="2" fill="#22c55e" opacity="0" transform="rotate(-15,18,115)">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="115;102;115" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Forest aura at base -->
    <ellipse cx="60" cy="150" rx="22" ry="5" fill="#16a34a" opacity="0.12" filter="url(#glow-r2)">
      <animate attributeName="opacity" values="0.12;0.25;0.12" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
