<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-vp"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-vp2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vamp-body" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="vamp-face" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e2d9f3"/>
      <stop offset="100%" stop-color="#a89bc2"/>
    </radialGradient>
    <linearGradient id="cape-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#06050f" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-7;0,0" dur="3.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Aura -->
    <ellipse cx="60" cy="110" rx="52" ry="55" fill="#7c3aed" opacity="0.05" filter="url(#glow-vp2)">
      <animate attributeName="opacity" values="0.05;0.13;0.05" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="22" ry="4" fill="#000" opacity="0.3">
      <animate attributeName="rx" values="22;16;22" dur="3.5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Cape -->
    <path d="M30,72 Q10,102 8,150 L18,140 Q16,128 22,118 Q20,132 28,148 Q34,126 36,112 Q30,132 42,148 Q44,122 42,102 Q52,124 50,148 Q58,120 58,100 L60,150 Q62,120 62,100 Q70,124 70,148 Q78,122 78,102 Q76,132 88,148 Q84,126 86,112 Q92,132 92,148 Q98,128 96,118 L106,140 L102,150 Q110,102 90,72 L60,82 Z"
      fill="url(#cape-grad)">
      <animate attributeName="d"
        values="M30,72 Q10,102 8,150 L18,140 Q16,128 22,118 Q20,132 28,148 Q34,126 36,112 Q30,132 42,148 Q44,122 42,102 Q52,124 50,148 Q58,120 58,100 L60,150 Q62,120 62,100 Q70,124 70,148 Q78,122 78,102 Q76,132 88,148 Q84,126 86,112 Q92,132 92,148 Q98,128 96,118 L106,140 L102,150 Q110,102 90,72 L60,82 Z;
                M28,72 Q8,104 6,152 L16,142 Q14,130 20,120 Q18,134 24,150 Q32,128 34,114 Q28,134 40,150 Q42,124 40,104 Q50,126 48,150 Q56,122 56,100 L60,152 Q64,122 64,100 Q70,126 72,150 Q80,124 80,104 Q78,134 90,150 Q86,128 88,114 Q94,134 96,150 Q102,130 100,120 L108,142 L104,152 Q112,104 92,72 L60,82 Z;
                M30,72 Q10,102 8,150 L18,140 Q16,128 22,118 Q20,132 28,148 Q34,126 36,112 Q30,132 42,148 Q44,122 42,102 Q52,124 50,148 Q58,120 58,100 L60,150 Q62,120 62,100 Q70,124 70,148 Q78,122 78,102 Q76,132 88,148 Q84,126 86,112 Q92,132 92,148 Q98,128 96,118 L106,140 L102,150 Q110,102 90,72 L60,82 Z"
        dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Cape inner folds -->
    <path d="M50,84 Q46,108 44,148 Q50,120 54,148 Q58,116 58,84 Z" fill="#312e81" opacity="0.35"/>
    <path d="M70,84 Q74,108 76,148 Q70,120 66,148 Q62,116 62,84 Z" fill="#312e81" opacity="0.35"/>

    <!-- Legs -->
    <rect x="44" y="118" width="13" height="36" rx="4" fill="#1e1b4b"/>
    <rect x="63" y="118" width="13" height="36" rx="4" fill="#1e1b4b"/>
    <!-- Shoes -->
    <ellipse cx="50" cy="154" rx="10" ry="4" fill="#09090f"/>
    <ellipse cx="69" cy="154" rx="10" ry="4" fill="#09090f"/>

    <!-- Body (tailcoat) -->
    <rect x="34" y="82" width="52" height="40" rx="6" fill="url(#vamp-body)"/>
    <!-- White cravat -->
    <rect x="54" y="84" width="12" height="26" rx="3" fill="#e2d9f3" opacity="0.9"/>
    <path d="M57,84 L60,94 L63,84" fill="#c4b5d4"/>
    <!-- Lapels -->
    <path d="M54,84 Q44,92 38,102" stroke="#312e81" stroke-width="2" fill="none"/>
    <path d="M66,84 Q76,92 82,102" stroke="#312e81" stroke-width="2" fill="none"/>

    <!-- Shoulders -->
    <ellipse cx="34" cy="88" rx="10" ry="6" fill="#312e81"/>
    <ellipse cx="86" cy="88" rx="10" ry="6" fill="#312e81"/>

    <!-- Arms -->
    <path d="M36,90 Q22,104 20,120" stroke="#1e1b4b" stroke-width="11" stroke-linecap="round" fill="none"/>
    <path d="M84,90 Q98,104 100,120" stroke="#1e1b4b" stroke-width="11" stroke-linecap="round" fill="none"/>
    <!-- Pale hands -->
    <circle cx="20" cy="122" r="7" fill="#c4b5d4"/>
    <circle cx="100" cy="122" r="7" fill="#c4b5d4"/>
    <!-- Clawed fingers -->
    <path d="M13,119 Q10,113 13,110 M16,117 Q13,111 16,107 M20,116 Q18,109 22,107 M24,118 Q25,111 28,109" stroke="#4c1d95" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M107,119 Q110,113 107,110 M104,117 Q107,111 104,107 M100,116 Q102,109 98,107 M96,118 Q95,111 92,109" stroke="#4c1d95" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Neck -->
    <rect x="54" y="72" width="12" height="14" rx="3" fill="#c4b5d4"/>

    <!-- Head -->
    <ellipse cx="60" cy="58" rx="20" ry="22" fill="url(#vamp-face)"/>
    <ellipse cx="55" cy="50" rx="9" ry="7" fill="#fff" opacity="0.18"/>

    <!-- Widow's peak hair -->
    <path d="M40,46 Q60,30 80,46 Q72,36 60,34 Q48,36 40,46 Z" fill="#0f0e1a"/>
    <path d="M40,46 Q36,52 38,62 Q40,54 40,46 Z" fill="#0f0e1a"/>
    <path d="M80,46 Q84,52 82,62 Q80,54 80,46 Z" fill="#0f0e1a"/>

    <!-- Eyes — glowing red -->
    <ellipse cx="50" cy="58" rx="7" ry="8" fill="#0a0005"/>
    <ellipse cx="70" cy="58" rx="7" ry="8" fill="#0a0005"/>
    <ellipse cx="50" cy="58" rx="5" ry="6" fill="#dc2626" filter="url(#glow-vp)">
      <animate attributeName="ry" values="6;8;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="58" rx="5" ry="6" fill="#dc2626" filter="url(#glow-vp)">
      <animate attributeName="ry" values="6;8;6" dur="2s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <ellipse cx="50" cy="58" rx="2" ry="4" fill="#300"/>
    <ellipse cx="70" cy="58" rx="2" ry="4" fill="#300"/>
    <circle cx="47" cy="55" r="2" fill="#fff" opacity="0.55"/>
    <circle cx="67" cy="55" r="2" fill="#fff" opacity="0.55"/>

    <!-- Nose -->
    <path d="M57,67 Q60,70 63,67" stroke="#a89bc2" stroke-width="1.5" fill="none"/>

    <!-- Fanged smile -->
    <path d="M46,74 Q60,80 74,74" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.7"/>
    <path d="M53,74 L51,80 L55,76 Z" fill="#fff"/>
    <path d="M67,74 L69,80 L65,76 Z" fill="#fff"/>
    <!-- Blood drip -->
    <path d="M55,79 Q55,84 57,83 Q58,84 56,80" fill="#dc2626" filter="url(#glow-vp)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
    </path>

    <!-- Bat silhouettes -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.65;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="transform" values="translate(0,0);translate(-6,-10);translate(0,0)" dur="3s" begin="1s" repeatCount="indefinite"/>
      <path d="M15,72 Q12,67 8,69 Q12,65 15,62 Q16,67 18,62 Q21,65 25,69 Q21,67 15,72 Z" fill="#312e81"/>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.55;0" dur="2.8s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="transform" values="translate(0,0);translate(6,-8);translate(0,0)" dur="2.8s" begin="2.2s" repeatCount="indefinite"/>
      <path d="M105,88 Q102,83 98,85 Q102,81 105,78 Q106,83 108,78 Q111,81 115,85 Q111,83 105,88 Z" fill="#312e81"/>
    </g>

    <!-- Ground glow -->
    <ellipse cx="60" cy="156" rx="20" ry="4" fill="#dc2626" opacity="0.08" filter="url(#glow-vp)">
      <animate attributeName="opacity" values="0.08;0.18;0.08" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
