<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-sk"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-sk2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="skull-grad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#d6d3d1"/>
    </radialGradient>
    <linearGradient id="scythe-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="50%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-5;-1,-2;0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="22" ry="4" fill="#000" opacity="0.2">
      <animate attributeName="rx" values="22;17;22" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Scythe (behind body) -->
    <!-- Staff -->
    <line x1="88" y1="155" x2="72" y2="20" stroke="#44403c" stroke-width="5" stroke-linecap="round"/>
    <line x1="88" y1="155" x2="72" y2="20" stroke="#78716c" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Blade curve -->
    <path d="M72,20 Q100,8 108,30 Q116,52 88,60" stroke="url(#scythe-grad)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M72,20 Q98,10 106,32 Q112,50 86,58" stroke="#a7f3d0" stroke-width="2" fill="none" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Blade inner glow -->
    <path d="M72,20 Q100,8 108,30 Q116,52 88,60" stroke="#6ee7b7" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow-sk2)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
    </path>

    <!-- Leg bones -->
    <rect x="47" y="118" width="9" height="38" rx="4" fill="#e7e5e4"/>
    <rect x="64" y="118" width="9" height="38" rx="4" fill="#e7e5e4"/>
    <!-- Foot bones -->
    <rect x="43" y="150" width="17" height="7" rx="3" fill="#d6d3d1"/>
    <rect x="60" y="150" width="17" height="7" rx="3" fill="#d6d3d1"/>
    <!-- Knee caps -->
    <circle cx="51" cy="120" r="6" fill="url(#skull-grad)"/>
    <circle cx="68" cy="120" r="6" fill="url(#skull-grad)"/>

    <!-- Spine -->
    <rect x="58" y="84" width="5" height="36" rx="2" fill="#e7e5e4"/>
    <!-- Spine vertebra dots -->
    <circle cx="60" cy="88" r="3" fill="url(#skull-grad)"/>
    <circle cx="60" cy="97" r="3" fill="url(#skull-grad)"/>
    <circle cx="60" cy="106" r="3" fill="url(#skull-grad)"/>
    <circle cx="60" cy="115" r="3" fill="url(#skull-grad)"/>

    <!-- Ribcage -->
    <!-- Left ribs -->
    <path d="M60,88 Q42,92 40,100 Q44,104 55,102" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M60,95 Q42,99 40,107 Q44,111 55,109" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M60,102 Q44,106 43,113 Q47,116 56,115" stroke="#d6d3d1" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right ribs -->
    <path d="M60,88 Q78,92 80,100 Q76,104 65,102" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M60,95 Q78,99 80,107 Q76,111 65,109" stroke="#d6d3d1" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M60,102 Q76,106 77,113 Q73,116 64,115" stroke="#d6d3d1" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Collar bones -->
    <path d="M42,84 Q60,80 78,84" stroke="#e7e5e4" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Left arm (bone) -->
    <path d="M42,84 Q30,95 28,110" stroke="#e7e5e4" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M28,110 Q24,124 26,132" stroke="#e7e5e4" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Left hand fingers -->
    <path d="M26,132 Q20,138 18,142 M26,132 Q24,140 24,145 M26,132 Q28,140 30,143" stroke="#d6d3d1" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Right arm holding scythe -->
    <path d="M78,84 Q86,92 87,108" stroke="#e7e5e4" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M87,108 Q88,122 88,132" stroke="#e7e5e4" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Neck -->
    <rect x="56" y="74" width="8" height="12" rx="3" fill="#e7e5e4"/>

    <!-- Skull -->
    <ellipse cx="60" cy="62" rx="22" ry="24" fill="url(#skull-grad)"/>
    <!-- Skull dome highlight -->
    <ellipse cx="55" cy="52" rx="12" ry="9" fill="#fff" opacity="0.25"/>
    <!-- Cheek bones -->
    <ellipse cx="42" cy="68" rx="8" ry="5" fill="#e7e5e4"/>
    <ellipse cx="78" cy="68" rx="8" ry="5" fill="#e7e5e4"/>

    <!-- Eye sockets — deep dark -->
    <ellipse cx="50" cy="63" rx="9" ry="10" fill="#0a0a0f"/>
    <ellipse cx="70" cy="63" rx="9" ry="10" fill="#0a0a0f"/>
    <!-- Glowing green eyes inside sockets -->
    <ellipse cx="50" cy="63" rx="6" ry="7" fill="#10b981" filter="url(#glow-sk)">
      <animate attributeName="ry" values="7;9;7" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="63" rx="6" ry="7" fill="#10b981" filter="url(#glow-sk)">
      <animate attributeName="ry" values="7;9;7" dur="2s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.4s"/>
    </ellipse>
    <!-- Eye pupils -->
    <ellipse cx="50" cy="63" rx="2" ry="3" fill="#000"/>
    <ellipse cx="70" cy="63" rx="2" ry="3" fill="#000"/>

    <!-- Nose hole -->
    <path d="M57,74 Q60,78 63,74" stroke="#0a0a0f" stroke-width="2" fill="#0a0a0f" opacity="0.7"/>

    <!-- Teeth / grin -->
    <rect x="46" y="78" width="28" height="4" rx="1" fill="#0a0a0f" opacity="0.5"/>
    <rect x="48" y="78" width="4" height="7" rx="1" fill="url(#skull-grad)"/>
    <rect x="54" y="78" width="4" height="7" rx="1" fill="url(#skull-grad)"/>
    <rect x="60" y="78" width="4" height="7" rx="1" fill="url(#skull-grad)"/>
    <rect x="66" y="78" width="4" height="7" rx="1" fill="url(#skull-grad)"/>

    <!-- Scythe glow particles -->
    <circle cx="108" cy="30" r="3" fill="#6ee7b7" filter="url(#glow-sk)">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;5;3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="18" r="2" fill="#a7f3d0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Death wisps -->
    <circle cx="15" cy="95" r="2.5" fill="#10b981" filter="url(#glow-sk)">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="95;82;95" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="110" r="2" fill="#34d399" filter="url(#glow-sk)">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="110;97;110" dur="2s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
