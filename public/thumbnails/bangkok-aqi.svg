<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="circleArc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="195" rx="150" ry="150" fill="url(#glow)"/>

  <!-- Scattered particles -->
  <circle cx="112" cy="72"  r="2.5" fill="#FBBF24" opacity="0.25"/>
  <circle cx="210" cy="38"  r="1.8" fill="#FBBF24" opacity="0.18"/>
  <circle cx="660" cy="55"  r="3.0" fill="#FBBF24" opacity="0.20"/>
  <circle cx="730" cy="130" r="1.8" fill="#FBBF24" opacity="0.25"/>
  <circle cx="75"  cy="310" r="2.0" fill="#94A3B8" opacity="0.22"/>
  <circle cx="748" cy="285" r="2.5" fill="#94A3B8" opacity="0.20"/>
  <circle cx="695" cy="390" r="1.8" fill="#94A3B8" opacity="0.18"/>
  <circle cx="128" cy="390" r="1.8" fill="#FBBF24" opacity="0.15"/>
  <circle cx="362" cy="28"  r="1.6" fill="#FBBF24" opacity="0.18"/>
  <circle cx="490" cy="425" r="2.2" fill="#FBBF24" opacity="0.13"/>
  <circle cx="565" cy="32"  r="1.5" fill="#94A3B8" opacity="0.15"/>
  <circle cx="308" cy="420" r="1.8" fill="#94A3B8" opacity="0.12"/>

  <!-- ── Title ── -->
  <text x="400" y="50" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="13"
        font-weight="600" fill="#94A3B8" letter-spacing="4">
    BANGKOK AIR QUALITY
  </text>

  <!-- ── AQI Circle ── -->
  <!-- outer subtle ring -->
  <circle cx="400" cy="195" r="100" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.12"/>
  <!-- middle ring -->
  <circle cx="400" cy="195" r="88"  fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.10"/>
  <!-- filled face -->
  <circle cx="400" cy="195" r="76"  fill="#0F172A" stroke="#F59E0B" stroke-width="2.5" opacity="0.95"/>
  <!-- progress arc ~60% of circumference, rotated to start at top-left -->
  <circle cx="400" cy="195" r="76"
          fill="none" stroke="url(#circleArc)" stroke-width="4"
          stroke-dasharray="285 192" stroke-dashoffset="144"
          stroke-linecap="round" opacity="0.92"/>

  <!-- AQI labels inside circle -->
  <text x="400" y="178" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="10"
        fill="#FBBF24" letter-spacing="2" opacity="0.75">AQI</text>
  <text x="400" y="215" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="48"
        font-weight="700" fill="#FFFFFF">87</text>
  <text x="400" y="233" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="10"
        fill="#FBBF24" letter-spacing="2" opacity="0.80">MODERATE</text>

  <!-- ── Left panel: 5-day forecast mini bar chart ── -->
  <text x="148" y="178" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1.5">5-DAY FORECAST</text>

  <!-- bars (bottom-anchored at y=296) -->
  <!-- MON -->
  <rect x="90"  y="258" width="18" height="38" rx="3" fill="url(#barGrad)" opacity="0.75"/>
  <text x="99"  y="308" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#64748B">MON</text>
  <!-- TUE -->
  <rect x="116" y="250" width="18" height="46" rx="3" fill="url(#barGrad)" opacity="0.65"/>
  <text x="125" y="308" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#64748B">TUE</text>
  <!-- WED -->
  <rect x="142" y="264" width="18" height="32" rx="3" fill="url(#barGrad)" opacity="0.80"/>
  <text x="151" y="308" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#64748B">WED</text>
  <!-- THU -->
  <rect x="168" y="272" width="18" height="24" rx="3" fill="url(#barGrad)" opacity="0.55"/>
  <text x="177" y="308" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#64748B">THU</text>
  <!-- FRI -->
  <rect x="194" y="260" width="18" height="36" rx="3" fill="url(#barGrad)" opacity="0.70"/>
  <text x="203" y="308" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8" fill="#64748B">FRI</text>

  <!-- ── Right panel: health advice ── -->
  <text x="622" y="178" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1.5">HEALTH ADVICE</text>
  <line x1="558" y1="186" x2="686" y2="186" stroke="#334155" stroke-width="1" opacity="0.7"/>

  <text x="622" y="212" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9.5" fill="#94A3B8">Sensitive groups</text>
  <text x="622" y="228" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9.5" fill="#94A3B8">may be affected.</text>
  <text x="622" y="252" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9.5" fill="#94A3B8">Wear a mask</text>
  <text x="622" y="268" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9.5" fill="#94A3B8">when outdoors.</text>

  <!-- ── Divider ── -->
  <line x1="72" y1="320" x2="728" y2="320" stroke="#1E293B" stroke-width="1.5" opacity="0.8"/>

  <!-- ── Stat cards ── -->
  <!-- PM2.5 -->
  <rect x="90"  y="332" width="140" height="76" rx="10" fill="#0F172A" opacity="0.70"/>
  <text x="160" y="356" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1">PM2.5</text>
  <text x="160" y="384" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="24"
        font-weight="700" fill="#FBBF24">42</text>
  <text x="160" y="399" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="8.5"
        fill="#64748B">μg/m³</text>

  <!-- Temp -->
  <rect x="250" y="332" width="140" height="76" rx="10" fill="#0F172A" opacity="0.70"/>
  <text x="320" y="356" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1">TEMP</text>
  <text x="320" y="384" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="24"
        font-weight="700" fill="#60A5FA">34°</text>
  <text x="320" y="399" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="8.5"
        fill="#64748B">Celsius</text>

  <!-- Humidity -->
  <rect x="410" y="332" width="140" height="76" rx="10" fill="#0F172A" opacity="0.70"/>
  <text x="480" y="356" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1">HUMIDITY</text>
  <text x="480" y="384" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="24"
        font-weight="700" fill="#34D399">72%</text>
  <text x="480" y="399" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="8.5"
        fill="#64748B">Relative</text>

  <!-- Wind -->
  <rect x="570" y="332" width="140" height="76" rx="10" fill="#0F172A" opacity="0.70"/>
  <text x="640" y="356" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="9"
        fill="#64748B" letter-spacing="1">WIND</text>
  <text x="640" y="384" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="24"
        font-weight="700" fill="#A78BFA">8</text>
  <text x="640" y="399" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="8.5"
        fill="#64748B">km/h</text>

  <!-- ── Footer ── -->
  <text x="400" y="434" text-anchor="middle"
        font-family="'Inter',system-ui,sans-serif" font-size="8.5"
        fill="#475569" letter-spacing="0.5">
    WAQI · Bangkok Huai Kwang · Auto-refresh every 5 min
  </text>
</svg>
