<svg width="120" height="160" viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-dm"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-dm2"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="demon-body" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#991b1b"/>
      <stop offset="60%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#1c0505"/>
    </radialGradient>
    <radialGradient id="demon-head" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#450a0a"/>
    </radialGradient>
    <linearGradient id="wing-dm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#450a0a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0005" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
      values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Hellfire aura (behind everything) -->
    <ellipse cx="60" cy="100" rx="55" ry="60" fill="#dc2626" opacity="0.06" filter="url(#glow-dm2)">
      <animate attributeName="opacity" values="0.06;0.14;0.06" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="55;62;55" dur="2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Shadow -->
    <ellipse cx="60" cy="157" rx="24" ry="5" fill="#000" opacity="0.35">
      <animate attributeName="rx" values="24;19;24" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Bat wings -->
    <!-- Left wing -->
    <path d="M34,88 Q12,68 8,40 Q14,58 22,72 Q10,48 16,28 Q24,50 30,70 Q20,42 34,30 Q36,58 34,88 Z"
      fill="url(#wing-dm)" opacity="0.9">
      <animate attributeName="d"
        values="M34,88 Q12,68 8,40 Q14,58 22,72 Q10,48 16,28 Q24,50 30,70 Q20,42 34,30 Q36,58 34,88 Z;
                M34,88 Q14,72 10,44 Q16,62 24,76 Q12,50 18,30 Q26,54 32,72 Q22,44 36,32 Q37,60 34,88 Z;
                M34,88 Q12,68 8,40 Q14,58 22,72 Q10,48 16,28 Q24,50 30,70 Q20,42 34,30 Q36,58 34,88 Z"
        dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Wing membranes left -->
    <line x1="34" y1="88" x2="8" y2="40" stroke="#7f1d1d" stroke-width="1" opacity="0.5"/>
    <line x1="34" y1="88" x2="16" y2="28" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
    <line x1="34" y1="88" x2="34" y2="30" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>

    <!-- Right wing -->
    <path d="M86,88 Q108,68 112,40 Q106,58 98,72 Q110,48 104,28 Q96,50 90,70 Q100,42 86,30 Q84,58 86,88 Z"
      fill="url(#wing-dm)" opacity="0.9">
      <animate attributeName="d"
        values="M86,88 Q108,68 112,40 Q106,58 98,72 Q110,48 104,28 Q96,50 90,70 Q100,42 86,30 Q84,58 86,88 Z;
                M86,88 Q106,72 110,44 Q104,62 96,76 Q108,50 102,30 Q94,54 88,72 Q98,44 84,32 Q83,60 86,88 Z;
                M86,88 Q108,68 112,40 Q106,58 98,72 Q110,48 104,28 Q96,50 90,70 Q100,42 86,30 Q84,58 86,88 Z"
        dur="2.5s" repeatCount="indefinite"/>
    </path>
    <line x1="86" y1="88" x2="112" y2="40" stroke="#7f1d1d" stroke-width="1" opacity="0.5"/>
    <line x1="86" y1="88" x2="104" y2="28" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>
    <line x1="86" y1="88" x2="86" y2="30" stroke="#7f1d1d" stroke-width="1" opacity="0.4"/>

    <!-- Tail -->
    <path d="M60,140 Q72,148 80,142 Q88,136 85,128 Q90,136 96,130"
      stroke="#991b1b" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M96,130 Q102,122 98,116" stroke="#7f1d1d" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Tail arrowhead -->
    <polygon points="98,116 106,110 92,112" fill="#dc2626"/>

    <!-- Legs -->
    <rect x="42" y="118" width="15" height="36" rx="5" fill="#7f1d1d"/>
    <rect x="63" y="118" width="15" height="36" rx="5" fill="#7f1d1d"/>
    <!-- Hooves -->
    <ellipse cx="49" cy="154" rx="10" ry="5" fill="#1c0505"/>
    <ellipse cx="70" cy="154" rx="10" ry="5" fill="#1c0505"/>
    <!-- Knee spikes -->
    <polygon points="49,119 45,110 53,110" fill="#dc2626"/>
    <polygon points="70,119 66,110 74,110" fill="#dc2626"/>

    <!-- Body (muscular torso) -->
    <rect x="32" y="82" width="56" height="42" rx="8" fill="url(#demon-body)"/>
    <!-- Abs definition -->
    <line x1="60" y1="84" x2="60" y2="120" stroke="#7f1d1d" stroke-width="2" opacity="0.5"/>
    <line x1="40" y1="96" x2="80" y2="96" stroke="#7f1d1d" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="107" x2="80" y2="107" stroke="#7f1d1d" stroke-width="1.5" opacity="0.35"/>
    <!-- Chest rune -->
    <text x="52" y="94" font-size="14" fill="#f97316" opacity="0.6" filter="url(#glow-dm)">⬡</text>
    <!-- Belt -->
    <rect x="32" y="120" width="56" height="6" rx="2" fill="#1c0505"/>

    <!-- Shoulder spikes -->
    <ellipse cx="32" cy="88" rx="12" ry="8" fill="#991b1b"/>
    <polygon points="32,78 27,68 37,68" fill="#dc2626"/>
    <polygon points="24,84 16,76 24,76" fill="#b91c1c"/>
    <ellipse cx="88" cy="88" rx="12" ry="8" fill="#991b1b"/>
    <polygon points="88,78 83,68 93,68" fill="#dc2626"/>
    <polygon points="96,84 104,76 96,76" fill="#b91c1c"/>

    <!-- Arms -->
    <path d="M34,90 Q20,102 18,116" stroke="#7f1d1d" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M86,90 Q100,102 102,116" stroke="#7f1d1d" stroke-width="12" stroke-linecap="round" fill="none"/>
    <!-- Clawed hands -->
    <circle cx="18" cy="118" r="8" fill="#991b1b"/>
    <circle cx="102" cy="118" r="8" fill="#991b1b"/>
    <!-- Claw fingers -->
    <path d="M10,115 Q6,108 10,105 M14,112 Q10,104 14,100 M18,111 Q16,102 20,99 M22,113 Q22,104 26,102" stroke="#450a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M110,115 Q114,108 110,105 M106,112 Q110,104 106,100 M102,111 Q104,102 100,99 M98,113 Q98,104 94,102" stroke="#450a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <ellipse cx="60" cy="68" rx="22" ry="24" fill="url(#demon-head)"/>
    <!-- Head highlight -->
    <ellipse cx="54" cy="58" rx="10" ry="8" fill="#ef4444" opacity="0.25"/>

    <!-- Horns (large curved) -->
    <path d="M44,50 Q30,28 36,10 Q40,28 46,46 Z" fill="#450a0a"/>
    <path d="M44,50 Q32,30 38,14 Q42,30 46,47 Z" fill="#7f1d1d" opacity="0.7"/>
    <path d="M76,50 Q90,28 84,10 Q80,28 74,46 Z" fill="#450a0a"/>
    <path d="M76,50 Q88,30 82,14 Q78,30 74,47 Z" fill="#7f1d1d" opacity="0.7"/>
    <!-- Horn glow tips -->
    <circle cx="36" cy="11" r="3" fill="#f97316" opacity="0.8" filter="url(#glow-dm)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="84" cy="11" r="3" fill="#f97316" opacity="0.8" filter="url(#glow-dm)">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>

    <!-- Eyes — glowing red -->
    <ellipse cx="50" cy="67" rx="7" ry="8" fill="#0a0a0f"/>
    <ellipse cx="70" cy="67" rx="7" ry="8" fill="#0a0a0f"/>
    <ellipse cx="50" cy="67" rx="5" ry="6" fill="#ef4444" filter="url(#glow-dm)">
      <animate attributeName="ry" values="6;8;6" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="1.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70" cy="67" rx="5" ry="6" fill="#ef4444" filter="url(#glow-dm)">
      <animate attributeName="ry" values="6;8;6" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </ellipse>
    <ellipse cx="50" cy="67" rx="2.5" ry="5" fill="#7f1d1d"/>
    <ellipse cx="70" cy="67" rx="2.5" ry="5" fill="#7f1d1d"/>

    <!-- Mouth (snarling) -->
    <path d="M46,80 Q60,88 74,80" stroke="#450a0a" stroke-width="2.5" fill="none"/>
    <path d="M50,80 L50,86 M55,81 L55,87 M60,82 L60,88 M65,81 L65,87 M70,80 L70,86" stroke="#1c0505" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Hellfire particles -->
    <circle cx="15" cy="80" r="3" fill="#ef4444" filter="url(#glow-dm)">
      <animate attributeName="opacity" values="0;0.9;0" dur="2s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;65;80" dur="2s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="105" cy="70" r="2.5" fill="#f97316" filter="url(#glow-dm)">
      <animate attributeName="opacity" values="0;0.8;0" dur="2.3s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;55;70" dur="2.3s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="110" r="2" fill="#dc2626">
      <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="100" r="2" fill="#ef4444">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
