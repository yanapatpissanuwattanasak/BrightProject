<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0D0628"/>
      <stop offset="100%" stop-color="#1A0A35"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0F08"/>
      <stop offset="100%" stop-color="#0D0A04"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080D20"/>
      <stop offset="100%" stop-color="#04080F"/>
    </linearGradient>
    <linearGradient id="cardR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081A18"/>
      <stop offset="100%" stop-color="#040D0C"/>
    </linearGradient>
    <radialGradient id="glowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="48"  cy="32"  r="1.5" fill="#fff" opacity="0.45"/>
  <circle cx="112" cy="18"  r="1.0" fill="#fff" opacity="0.35"/>
  <circle cx="195" cy="26"  r="1.8" fill="#fff" opacity="0.40"/>
  <circle cx="278" cy="14"  r="1.2" fill="#fff" opacity="0.30"/>
  <circle cx="362" cy="22"  r="2.0" fill="#FCD34D" opacity="0.50"/>
  <circle cx="440" cy="10"  r="1.0" fill="#fff" opacity="0.35"/>
  <circle cx="520" cy="28"  r="1.5" fill="#fff" opacity="0.40"/>
  <circle cx="610" cy="15"  r="1.8" fill="#FCD34D" opacity="0.45"/>
  <circle cx="695" cy="30"  r="1.2" fill="#fff" opacity="0.35"/>
  <circle cx="750" cy="12"  r="2.0" fill="#fff" opacity="0.50"/>
  <circle cx="72"  cy="400" r="1.2" fill="#fff" opacity="0.25"/>
  <circle cx="730" cy="380" r="1.5" fill="#fff" opacity="0.30"/>
  <circle cx="400" cy="430" r="1.0" fill="#FCD34D" opacity="0.35"/>
  <circle cx="55"  cy="200" r="1.2" fill="#fff" opacity="0.20"/>
  <circle cx="745" cy="220" r="1.2" fill="#fff" opacity="0.20"/>

  <!-- Glow behind center card -->
  <ellipse cx="400" cy="195" rx="110" ry="155" fill="url(#glowC)"/>

  <!-- ── Left card (rotated -6°) ── -->
  <g transform="rotate(-6 170 192)">
    <rect x="90" y="75" width="160" height="235" rx="12" fill="url(#cardL)" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Inner border -->
    <rect x="98" y="83" width="144" height="219" rx="9" fill="none" stroke="#B8860B" stroke-width="0.8" opacity="0.4"/>
    <!-- Roman numeral -->
    <text x="170" y="108" text-anchor="middle" font-family="'Georgia',serif" font-size="14" letter-spacing="2" fill="#F59E0B" opacity="0.85">I</text>
    <line x1="98" y1="118" x2="242" y2="118" stroke="#B8860B" stroke-width="0.8" opacity="0.4"/>
    <!-- Sun symbol -->
    <!-- Outer circle -->
    <circle cx="170" cy="178" r="26" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.7"/>
    <!-- Inner glow circle -->
    <circle cx="170" cy="178" r="16" fill="#F59E0B" opacity="0.18"/>
    <!-- Center dot -->
    <circle cx="170" cy="178" r="5" fill="#F59E0B" opacity="0.85"/>
    <!-- 8 rays (inner r=28, outer r=36) -->
    <line x1="170" y1="150" x2="170" y2="142" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="170" y1="206" x2="170" y2="214" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="142" y1="178" x2="134" y2="178" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="198" y1="178" x2="206" y2="178" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="150" y1="158" x2="144" y2="152" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="190" y1="158" x2="196" y2="152" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="150" y1="198" x2="144" y2="204" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="190" y1="198" x2="196" y2="204" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <!-- Bottom -->
    <line x1="98" y1="238" x2="242" y2="238" stroke="#B8860B" stroke-width="0.8" opacity="0.4"/>
    <text x="170" y="260" text-anchor="middle" font-family="'Georgia',serif" font-size="9" letter-spacing="2" fill="#F59E0B" opacity="0.75">THE SUN</text>
  </g>

  <!-- ── Center card (no rotation, larger) ── -->
  <rect x="310" y="58" width="180" height="268" rx="14" fill="url(#cardC)" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="320" y="68" width="160" height="248" rx="10" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.4"/>
  <!-- Roman numeral -->
  <text x="400" y="97" text-anchor="middle" font-family="'Georgia',serif" font-size="15" letter-spacing="2" fill="#E2E8F0" opacity="0.90">XVIII</text>
  <line x1="320" y1="108" x2="480" y2="108" stroke="#CBD5E1" stroke-width="0.8" opacity="0.4"/>
  <!-- Moon symbol (crescent) -->
  <circle cx="400" cy="190" r="38" fill="#E2E8F0" opacity="0.15"/>
  <circle cx="400" cy="190" r="28" fill="#CBD5E1" opacity="0.22"/>
  <!-- Crescent: full circle then overlay -->
  <circle cx="400" cy="190" r="26" fill="#94A3B8" opacity="0.9"/>
  <circle cx="412" cy="186" r="22" fill="#04080F" opacity="1"/>
  <!-- Stars inside crescent -->
  <circle cx="390" cy="183" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="383" cy="196" r="1.5" fill="#fff" opacity="0.55"/>
  <circle cx="395" cy="205" r="1.2" fill="#fff" opacity="0.50"/>
  <!-- Bottom -->
  <line x1="320" y1="270" x2="480" y2="270" stroke="#CBD5E1" stroke-width="0.8" opacity="0.4"/>
  <text x="400" y="294" text-anchor="middle" font-family="'Georgia',serif" font-size="10" letter-spacing="2" fill="#E2E8F0" opacity="0.80">THE MOON</text>

  <!-- ── Right card (rotated +6°) ── -->
  <g transform="rotate(6 630 192)">
    <rect x="550" y="75" width="160" height="235" rx="12" fill="url(#cardR)" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="558" y="83" width="144" height="219" rx="9" fill="none" stroke="#0D9488" stroke-width="0.8" opacity="0.4"/>
    <!-- Roman numeral -->
    <text x="630" y="108" text-anchor="middle" font-family="'Georgia',serif" font-size="14" letter-spacing="2" fill="#14B8A6" opacity="0.85">XVII</text>
    <line x1="558" y1="118" x2="702" y2="118" stroke="#0D9488" stroke-width="0.8" opacity="0.4"/>
    <!-- Star symbol (5-pointed) -->
    <polygon points="630,147 634.7,161.5 649,161.8 637.6,170.5 641.8,185.2 630,177 618.2,185.2 622.4,170.5 611,161.8 625.3,161.5"
             fill="#14B8A6" opacity="0.85"/>
    <!-- Outer ring -->
    <circle cx="630" cy="167" r="28" fill="none" stroke="#14B8A6" stroke-width="1" opacity="0.35"/>
    <!-- Small stars around -->
    <circle cx="604" cy="142" r="2"   fill="#14B8A6" opacity="0.55"/>
    <circle cx="656" cy="142" r="2"   fill="#14B8A6" opacity="0.55"/>
    <circle cx="600" cy="185" r="1.5" fill="#14B8A6" opacity="0.45"/>
    <circle cx="660" cy="185" r="1.5" fill="#14B8A6" opacity="0.45"/>
    <circle cx="630" cy="200" r="1.8" fill="#14B8A6" opacity="0.50"/>
    <!-- Bottom -->
    <line x1="558" y1="238" x2="702" y2="238" stroke="#0D9488" stroke-width="0.8" opacity="0.4"/>
    <text x="630" y="260" text-anchor="middle" font-family="'Georgia',serif" font-size="9" letter-spacing="2" fill="#14B8A6" opacity="0.75">THE STAR</text>
  </g>

  <!-- Card labels -->
  <text x="170" y="340" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94A3B8" letter-spacing="3">PAST</text>
  <text x="400" y="355" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#CBD5E1" letter-spacing="3">PRESENT</text>
  <text x="630" y="340" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94A3B8" letter-spacing="3">FUTURE</text>

  <!-- Decorative horizontal rule -->
  <line x1="60" y1="372" x2="740" y2="372" stroke="#2D1B69" stroke-width="1" opacity="0.6"/>

  <!-- Stats -->
  <text x="200" y="400" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9"  fill="#64748B" letter-spacing="1">MAJOR ARCANA</text>
  <text x="200" y="422" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="22" font-weight="700" fill="#A78BFA">22</text>

  <text x="400" y="400" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9"  fill="#64748B" letter-spacing="1">POSITIONS</text>
  <text x="400" y="422" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="22" font-weight="700" fill="#818CF8">3</text>

  <text x="600" y="400" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9"  fill="#64748B" letter-spacing="1">REVERSED CHANCE</text>
  <text x="600" y="422" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="22" font-weight="700" fill="#6366F1">40%</text>

  <text x="400" y="444" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="8.5" fill="#334155" letter-spacing="0.5">React · TypeScript · Framer Motion · CSS 3D</text>
</svg>
